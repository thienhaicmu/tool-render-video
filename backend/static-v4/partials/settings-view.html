<section class="card hiddenView" id="card_reports">
  <div class="sectionHeader">
    <div>
      <div class="sectionTitle">Reports</div>
      <div class="sectionSubtitle">Summary of render and upload results.</div>
    </div>
    <button class="ghostButton sm">Refresh</button>
  </div>
  <div class="emptyState">
    <div class="icon">📊</div>
    <div>Reports will be available here.</div>
  </div>
</section>

<section class="card hiddenView" id="card_settings">
  <div class="sectionHeader">
    <div>
      <div class="sectionTitle">Settings</div>
      <div class="sectionSubtitle">System maintenance and operational options.</div>
    </div>
  </div>

  <div class="evSectionTitle">Cleanup policy</div>
  <div class="fieldRow">
    <div class="fieldGroup">
      <label class="fieldLabel" for="cleanup_keep_last">Keep last N jobs</label>
      <input type="number" id="cleanup_keep_last" value="10" min="1" />
    </div>
    <div class="fieldGroup">
      <label class="fieldLabel" for="cleanup_older_days">Delete after (days)</label>
      <input type="number" id="cleanup_older_days" value="30" min="1" />
    </div>
  </div>

  <div class="divider"></div>

  <div class="evSectionTitle alt">Output preferences</div>
  <div class="fieldGroup">
    <label class="fieldLabel" for="output_mode_select">Output mode</label>
    <select id="output_mode_select">
      <option value="standard">Standard</option>
      <option value="batch">Batch</option>
      <option value="archive">Archive</option>
    </select>
  </div>

  <div class="divider"></div>

  <div class="evSectionTitle">Diagnostics</div>
  <button class="ghostButton sm" onclick="copyRenderDiagnostics()">📋 Copy diagnostics</button>
</section>
