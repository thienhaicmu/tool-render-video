<section id="view_history" class="historyWorkspace hiddenView" aria-live="polite">

  <div class="hwHeader">
    <div class="hwHeaderLeft">
      <div class="hwTitle">History</div>
      <div class="hwSub">Review previous jobs and reopen outputs</div>
    </div>
    <div class="hwHeaderRight">
      <span class="hwMeta" id="history_status_text"></span>
      <button class="hwRefreshBtn" type="button" onclick="loadHistoryView()" title="Refresh">&#8635; Refresh</button>
    </div>
  </div>

  <div class="hwFilterBar" id="history_filter_bar">
    <button class="hwFilterBtn active" data-filter="all"       onclick="setHistoryFilter('all')">All</button>
    <button class="hwFilterBtn"        data-filter="render"    onclick="setHistoryFilter('render')">Render</button>
    <button class="hwFilterBtn"        data-filter="download"  onclick="setHistoryFilter('download')">Download</button>
    <button class="hwFilterBtn"        data-filter="completed" onclick="setHistoryFilter('completed')">Completed</button>
    <button class="hwFilterBtn"        data-filter="failed"    onclick="setHistoryFilter('failed')">Failed</button>
  </div>

  <div class="hwBody">
    <div class="historyList" id="history_list">
      <div class="hwEmpty">
        <div class="hwEmptyIcon">&#128203;</div>
        <div class="hwEmptyTitle">No history yet</div>
        <div class="hwEmptySub">Completed render, download, and upload jobs will appear here.</div>
      </div>
    </div>
  </div>

</section>
