    <div>
      <div class="downloadWorkspaceTitle">Batch Download</div>
      <div class="downloadWorkspaceSub" id="download_summary_text">Paste public social video links to build a download queue.</div>

    <div class="downloadWorkspaceMeta">
      <div class="downloadBatchStatus" id="download_batch_status">Idle</div>
