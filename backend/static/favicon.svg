<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Film strip left accent -->
  <rect x="56" y="120" width="28" height="272" rx="6" fill="white" opacity="0.15"/>
  <rect x="60" y="136" width="20" height="20" rx="3" fill="url(#bg)" opacity="0.6"/>
  <rect x="60" y="168" width="20" height="20" rx="3" fill="url(#bg)" opacity="0.6"/>
  <rect x="60" y="200" width="20" height="20" rx="3" fill="url(#bg)" opacity="0.6"/>
  <rect x="60" y="296" width="20" height="20" rx="3" fill="url(#bg)" opacity="0.6"/>
  <rect x="60" y="328" width="20" height="20" rx="3" fill="url(#bg)" opacity="0.6"/>
  <rect x="60" y="360" width="20" height="20" rx="3" fill="url(#bg)" opacity="0.6"/>
  <!-- Play button -->
  <circle cx="280" cy="256" r="130" fill="white" opacity="0.15"/>
  <polygon points="238,176 238,336 372,256" fill="white" filter="url(#shadow)"/>
</svg>
