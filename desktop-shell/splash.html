<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <title>Render Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-app-region: drag;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 28px 32px 24px;
    }

    /* ── Logo / app name ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }

    .app-name {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.01em;
    }

    /* ── Subtitle / tagline ── */
    .tagline {
      font-size: 11.5px;
      color: #475569;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ── Status text ── */
    .status-text {
      font-size: 12.5px;
      color: #94a3b8;
      height: 18px;
      text-align: center;
      margin-bottom: 16px;
      transition: opacity 0.18s ease;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Progress bar ── */
    .progress-track {
      width: 280px;
      height: 2px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      margin-bottom: 24px;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent 0%, #6366f1 40%, #8b5cf6 60%, transparent 100%);
      border-radius: 2px;
      animation: slide 1.6s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(700%); }
    }

    /* ── Version ── */
    .version {
      font-size: 10px;
      color: #334155;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="logo-row">
    <div class="logo-icon">
      <!-- simple play/film icon -->
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="14" height="14" rx="2" fill="none" stroke="#fff" stroke-width="1.4"/>
        <polygon points="6,5 11,8 6,11" fill="#fff"/>
      </svg>
    </div>
    <span class="app-name">Render Studio</span>
  </div>

  <div class="tagline">Desktop</div>

  <div class="status-text" id="status">Starting up...</div>

  <div class="progress-track">
    <div class="progress-fill"></div>
  </div>

  <div class="version" id="version"></div>

  <script>
    // Receive boot-status IPC messages from main process via preload bridge
    if (window.electronAPI && typeof window.electronAPI.onBootStatus === 'function') {
      window.electronAPI.onBootStatus(function(msg) {
        var el = document.getElementById('status');
        if (el) el.textContent = msg || '';
      });
    }
    // Show app version if provided
    if (window.electronAPI && typeof window.electronAPI.onBootVersion === 'function') {
      window.electronAPI.onBootVersion(function(ver) {
        var el = document.getElementById('version');
        if (el && ver) el.textContent = 'v' + ver;
      });
    }
  </script>
</body>
</html>
