name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend pytest
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile-check all changed Python files
        run: python -m compileall backend/app -q

      - name: Run pytest
        working-directory: backend
        env:
          STATIC_UI_VERSION: legacy
        run: python -m pytest --tb=short -q

  frontend:
    name: Frontend vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Frontend triage (Sprint 7 follow-up): the 5 stale test files that
    # exercised the old 6-step studio flow / 4-item sidebar were deleted in
    # commit a14? — see docs/review/AUDIT_2026-06-02_followup.md for the
    # rewrite tracking. The remaining vitest suite passes cleanly so this
    # job now blocks PRs (continue-on-error removed).
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc -b

      - name: Run vitest
        working-directory: frontend
        run: npm test

  openapi-drift:
    name: OpenAPI codegen drift check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Sprint 5.1: the committed frontend/src/types/openapi-generated.ts
    # must match what `npm run gen:openapi` produces against the current
    # backend FastAPI app. If the backend route surface or any Pydantic
    # field changes without regenerating, this job fails — the engineer
    # must run `npm run gen:openapi` locally and commit the diff.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps (fastapi etc. — needed by dump_openapi.py)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Regenerate OpenAPI types
        working-directory: frontend
        run: npm run gen:openapi

      - name: Diff against committed file
        working-directory: frontend
        run: |
          git diff --exit-code src/types/openapi-generated.ts \
            || (echo "::error::OpenAPI types drift detected. Run 'npm run gen:openapi' locally and commit the regenerated frontend/src/types/openapi-generated.ts." && exit 1)

  devtools-security:
    name: Devtools security gates
    runs-on: windows-latest
    timeout-minutes: 5
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run devtools security tests only
        working-directory: backend
        run: python -m pytest tests/test_devtools_security.py -v --tb=short
