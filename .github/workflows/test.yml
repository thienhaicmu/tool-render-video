name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend pytest
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile-check all changed Python files
        run: python -m compileall backend/app -q

      - name: Run pytest
        working-directory: backend
        env:
          STATIC_UI_VERSION: legacy
        run: python -m pytest --tb=short -q

  frontend:
    name: Frontend vitest (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Frontend test suite has known pre-existing failures (history-screen,
    # job-actions, job-detail-open-editor) that are unrelated to PR scope.
    # This job runs vitest for visibility but does NOT block merges until
    # those failures are triaged. Track in docs/review/AUDIT_2026-06-02.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc -b

      - name: Run vitest
        working-directory: frontend
        run: npm test

  devtools-security:
    name: Devtools security gates
    runs-on: windows-latest
    timeout-minutes: 5
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run devtools security tests only
        working-directory: backend
        run: python -m pytest tests/test_devtools_security.py -v --tb=short
